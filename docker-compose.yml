services:
  postgres:
    image: postgres:16-alpine
    container_name: tuncauto-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tuncauto
      POSTGRES_PASSWORD: tuncauto
      POSTGRES_DB: tuncauto
    volumes:
      - tuncauto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuncauto -d tuncauto"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tuncauto_pgdata:
